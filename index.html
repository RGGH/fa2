<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linear Regression Predictor</title>
    <link rel="stylesheet" href="/static/index.css">
</head>

<body>

    <h1>Linear Regression Predictor</h1>

    <label>
        Size (m²):
        <input id="size" type="number" value="100">
    </label>

    <br>

    <label>
        Bedrooms:
        <input id="bedrooms" type="number" value="3">
    </label>

    <br>

    <label>
        Distance from city (km):
        <input id="distance" type="number" value="5">
    </label>

    <br>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>


    <script>
        async function predict() {

            const size = document.getElementById("size").value;
            const bedrooms = document.getElementById("bedrooms").value;
            const distance = document.getElementById("distance").value;

            const response = await fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    size: Number(size),
                    bedrooms: Number(bedrooms),
                    distance: Number(distance)
                })
            });

            const data = await response.json();

            document.getElementById("result").innerHTML =
                `Prediction: £${data.prediction.toFixed(2)}`;
        }
    </script>

</body>
</html>
