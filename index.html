<body>

    <h1>Linear Regression Predictor</h1>

    <label>
        Size (m²):
        <input id="size" type="number" value="100">
    </label>

    <br>

    <label>
        Bedrooms:

    <br>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
