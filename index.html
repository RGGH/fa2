<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linear Regression House Price Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white shadow-md rounded-2xl p-6 space-y-6">

        <h1 class="text-2xl font-semibold text-center text-gray-900">
            Linear Regression Predictor
        </h1>

        <div class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    Size (m²)
                </label>
                <input id="size" type="number" value="100"
                    class="w-full rounded-lg border border-gray-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    Bedrooms
                </label>
                <input id="bedrooms" type="number" value="3"
                    class="w-full rounded-lg border border-gray-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">
                    Distance from city (km)
                </label>
                <input id="distance" type="number" value="5"
                    class="w-full rounded-lg border border-gray-200 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent">
            </div>

        </div>

        <button onclick="predict()"
            class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 active:scale-[0.99] transition">
            Predict
        </button>

        <div id="result"
            class="text-center text-lg font-semibold text-gray-900 pt-2">
        </div>

    </div>

    <script>
        async function predict() {
            const size = document.getElementById("size").value;
            const bedrooms = document.getElementById("bedrooms").value;
            const distance = document.getElementById("distance").value;

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    size: Number(size),
                    bedrooms: Number(bedrooms),
                    distance: Number(distance)
                })
            });

            const data = await response.json();

            document.getElementById("result").innerHTML =
                `Prediction: £${data.prediction.toFixed(2)}`;
        }
    </script>

</body>
</html>
